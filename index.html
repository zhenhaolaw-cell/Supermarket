<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>便民超市 - 首页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei","Helvetica Neue",Arial,sans-serif;}
a{text-decoration:none;color:#333;}ul,ol{list-style:none;}img{border:none;vertical-align:middle;}
:root{--red:#e4393c;--orange:#ff6a00;--text:#333;--tlight:#666;--tlighter:#999;--border:#e0e0e0;--bg:#f5f5f5;--white:#fff;}

/* ===== 顶部导航 ===== */
.top-nav{height:30px;background:#f2f2f2;border-bottom:1px solid #e5e5e5;line-height:30px;font-size:12px;color:var(--tlight);}
.container{width:1200px;margin:0 auto;}
.top-nav-left{float:left;}.top-nav-right{float:right;}
.top-nav a{color:var(--tlight);margin:0 8px;transition:color .2s;}
.top-nav a:hover{color:var(--red);}

/* ===== 头部 ===== */
.header{height:100px;background:var(--white);border-bottom:1px solid var(--border);}
.header-content{display:flex;align-items:center;height:100%;}
.logo{width:200px;height:60px;background:linear-gradient(135deg,var(--red),#c81623);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:24px;font-weight:bold;margin-right:50px;box-shadow:0 2px 8px rgba(228,57,60,.3);}
.search-box{flex:1;display:flex;height:40px;}
.search-input{flex:1;padding:0 15px;border:2px solid var(--red);border-right:none;border-radius:4px 0 0 4px;font-size:14px;outline:none;transition:box-shadow .2s;}
.search-input:focus{box-shadow:0 0 6px rgba(228,57,60,.3);}

/* ===== 搜索按钮 ===== */
.search-btn{width:100px;height:40px;background:var(--red);color:var(--white);border:none;border-radius:0 4px 4px 0;font-size:16px;cursor:pointer;transition:background .2s,transform .1s;}
.search-btn:hover{background:#c81623;}
.search-btn:active{transform:scale(.96);}

/* ===== 购物车按钮 ===== */
.cart-btn{width:140px;height:40px;background:var(--white);border:1px solid var(--border);border-radius:4px;margin-left:30px;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:14px;position:relative;transition:border-color .2s,box-shadow .2s,transform .1s;}
.cart-btn:hover{border-color:var(--red);box-shadow:0 0 8px rgba(228,57,60,.15);}
.cart-btn:active{transform:scale(.97);}
.cart-count{position:absolute;top:-8px;right:20px;background:var(--red);color:var(--white);font-size:12px;padding:1px 6px;border-radius:8px;min-width:16px;text-align:center;}

/* ===== 主导航 / 商品分类 ===== */
.main-nav{height:44px;background:linear-gradient(135deg,var(--red),#c81623);line-height:44px;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.nav-list{display:flex;}
.nav-item{padding:0;position:relative;}
.nav-item a{color:var(--white);font-size:14px;display:block;padding:0 22px;transition:background .25s;position:relative;}
.nav-item a:hover{background:rgba(255,255,255,.2);}
.nav-item a::after{content:"";position:absolute;bottom:0;left:50%;width:0;height:3px;background:#fff;transition:all .25s;transform:translateX(-50%);border-radius:2px 2px 0 0;}
.nav-item a:hover::after{width:60%;}
.nav-item + .nav-item::before{content:"|";position:absolute;left:0;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.25);font-size:12px;}

/* ===== 页脚 ===== */
.footer{background:#333;color:#ccc;padding:30px 0;text-align:center;font-size:12px;margin-top:40px;}.footer a{color:#999;margin:0 10px;transition:color .2s;}.footer a:hover{color:var(--red);}

/* ===== 商品网格 ===== */
.goods-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:20px 0;}
.goods-card{background:var(--white);border-radius:10px;overflow:hidden;border:1px solid var(--border);transition:transform .3s,box-shadow .3s;}
.goods-card:hover{transform:translateY(-6px);box-shadow:0 8px 25px rgba(0,0,0,.12);}
.goods-img{height:200px;background:#f7f7f7;display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--tlighter);}
.goods-info{padding:15px;}
.goods-name{font-size:14px;color:var(--text);margin-bottom:8px;height:40px;overflow:hidden;line-height:1.5;}
.goods-name a{color:var(--text);transition:color .2s;}
.goods-name a:hover{color:var(--red);}
.goods-price{color:var(--red);font-size:20px;font-weight:bold;margin-bottom:12px;}

/* ===== 加入购物车按钮 ===== */
.add-cart-btn{width:100%;padding:9px;background:var(--red);color:var(--white);border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:background .2s,transform .1s,box-shadow .2s;}
.add-cart-btn:hover{background:#c81623;box-shadow:0 3px 10px rgba(228,57,60,.35);}
.add-cart-btn:active{transform:scale(.96);}

/* ===== Banner ===== */
.banner{background:linear-gradient(135deg,#e4393c,#ff6a00);color:var(--white);padding:40px;text-align:center;margin:20px 0;border-radius:10px;box-shadow:0 4px 15px rgba(228,57,60,.25);}
.banner h2{font-size:28px;margin-bottom:10px;}
.section-title{font-size:20px;font-weight:bold;color:var(--text);margin:30px 0 20px;display:flex;justify-content:space-between;}

/* ===== 排序按钮 ===== */
.sort-btn{padding:6px 18px;border:1px solid var(--border);border-radius:20px;background:var(--white);cursor:pointer;font-size:13px;margin-right:10px;transition:all .25s;}
.sort-btn:hover{border-color:var(--red);color:var(--red);background:#fff5f5;}
.sort-btn.active{border-color:var(--red);color:var(--white);background:var(--red);}
.sort-btn.active:hover{background:#c81623;}
.sort-btn:active{transform:scale(.95);}

/* ===== 分页按钮 ===== */
.page-btn{display:inline-block;padding:6px 14px;border:1px solid var(--border);margin:0 3px;border-radius:6px;cursor:pointer;font-size:13px;background:var(--white);transition:all .2s;}
.page-btn:hover{border-color:var(--red);color:var(--red);}
.page-btn.active{background:var(--red);color:var(--white);border-color:var(--red);}
.page-btn:active{transform:scale(.93);}

/* ===== 通用按钮 ===== */
.btn{padding:10px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer;display:inline-block;text-decoration:none;transition:all .25s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.btn:active{transform:translateY(0) scale(.97);}

/* ===== 数量按钮 ===== */
.qty-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--white);cursor:pointer;border-radius:4px;font-size:16px;transition:all .2s;}
.qty-btn:hover{background:#f5f5f5;border-color:var(--red);color:var(--red);}
.qty-btn:active{transform:scale(.9);background:var(--red);color:white;}

/* ===== 结算按钮 ===== */
.checkout-btn{padding:12px 44px;background:var(--red);color:var(--white);border:none;border-radius:6px;font-size:16px;cursor:pointer;transition:all .25s;font-weight:bold;}
.checkout-btn:hover{background:#c81623;box-shadow:0 4px 15px rgba(228,57,60,.4);transform:translateY(-1px);}
.checkout-btn:active{transform:translateY(0) scale(.97);}*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei","Helvetica Neue",Arial,sans-serif;}

.banner{background:linear-gradient(135deg,#e4393c,#ff6a00);color:var(--white);padding:40px;text-align:center;margin:20px 0;border-radius:8px;}

</style></head>

<div class="logo">便民超市</div>
<div class="search-box"><input type="text" class="search-input" id="searchInput" placeholder="搜索商品、品牌、店铺"><button class="search-btn" id="searchBtn">搜索</button></div>
<a href="cart.html" class="cart-btn">购物车<span class="cart-count" id="cartCount" style="display:none;">0</span></a>
</div></div></div>

</ul></div></div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script>async function renderGoods(){
    var g = await API.getGoods(), grid = document.getElementById("goodsGrid");
    grid.innerHTML = "";
    for(var i = 0; i < g.length; i++){
        var card = document.createElement("div"); card.className = "goods-card";
        card.innerHTML = '<a href="goods_detail.html?id=' + g[i].id + '"><div class="goods-img">' + g[i].img + '</div></a><div class="goods-info"><h3 class="goods-name"><a href="goods_detail.html?id=' + g[i].id + '">' + g[i].name + '</a></h3><div class="goods-price"><span>¥</span>' + g[i].price.toFixed(2) + '</div><button class="add-cart-btn" data-id="' + g[i].id + '">加入购物车</button></div>';
        grid.appendChild(card);
    }
    document.querySelectorAll(".add-cart-btn").forEach(function(btn){
        btn.addEventListener("click", async function(e){
            e.preventDefault(); var id = parseInt(this.dataset.id);
            var goods = await API.getGoods();
            var gi = goods.find(function(g){return g.id === id;});
            if(await API.addToCart(id,1,"")){showToast(gi.name+"已加入购物车");}
            else{showToast("加入购物车失败");}
        });
    });
}
document.getElementById("searchBtn").addEventListener("click",function(){
    var kw = document.getElementById("searchInput").value.trim();
    if(kw){window.location.href="goods_list.html?keyword="+encodeURIComponent(kw);}
    else{showToast("请输入搜索关键词");}
});
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter"){document.getElementById("searchBtn").click();}});
(async function(){ await updateCartCount(); await renderGoods(); })();
</script></body></html>
