<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据统计 - 便民超市后台管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei","Helvetica Neue",Arial,sans-serif;}
a{text-decoration:none;color:#333;}ul,ol{list-style:none;}
:root{--red:#e4393c;--orange:#ff6a00;--text:#333;--tlight:#666;--border:#e0e0e0;--bg:#f5f5f5;--white:#fff;--green:#52c41a;--yellow:#faad14;}
body{background:var(--bg);}
.top-header{height:60px;background:var(--white);border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.header-left{display:flex;align-items:center;}
.logo{width:180px;height:40px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:18px;font-weight:bold;margin-right:30px;}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);position:fixed;top:60px;left:0;bottom:0;overflow-y:auto;padding-top:20px;}
.menu-item{padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);cursor:pointer;border-left:3px solid transparent;}
.menu-item:hover{background:#f9f9f9;color:var(--red);}
.menu-item.active{background:#fff5f5;color:var(--red);border-left-color:var(--red);font-weight:500;}
.main-content{margin-left:220px;margin-top:60px;padding:20px;min-height:calc(100vh-60px);}
.page-title{font-size:22px;font-weight:bold;color:var(--text);margin-bottom:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px;}
.stat-card{background:var(--white);border-radius:8px;padding:20px;box-shadow:0 2px 4px rgba(0,0,0,.04);}
.stat-card .num{font-size:28px;font-weight:bold;color:var(--red);margin:10px 0;}
.stat-card .label{font-size:14px;color:var(--tlight);}
.section-title{font-size:18px;font-weight:bold;color:var(--text);margin:20px 0;}
table{width:100%;border-collapse:collapse;background:var(--white);border-radius:8px;overflow:hidden;box-shadow:0 2px 4px rgba(0,0,0,.04);}
th,td{padding:12px 15px;text-align:left;border-bottom:1px solid var(--border);font-size:14px;}
th{background:#fafafa;font-weight:600;color:var(--text);}
.status-tag{padding:2px 10px;border-radius:10px;font-size:12px;}
.status-tag.success{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f;}
.status-tag.warning{background:#fffbe6;color:#faad14;border:1px solid #ffe58f;}
.logout-btn{padding:6px 15px;background:var(--white);border:1px solid var(--border);border-radius:4px;font-size:13px;cursor:pointer;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
</style></head>
<body>
<div class="top-header"><div class="header-left"><div class="logo">便民超市</div></div><div class="header-right"><button class="logout-btn" id="logoutBtn">退出登录</button></div></div>
<div class="sidebar">
<div class="menu-item active"><span>📊</span> 数据统计</div>
<div class="menu-item" onclick="location.href='admin_goods.html'"><span>📦</span> 商品管理</div>
<div class="menu-item" onclick="location.href='admin_order.html'"><span>📋</span> 订单管理</div>
<div class="menu-item" onclick="location.href='admin_member.html'"><span>👥</span> 会员管理</div>
</div>
<div class="main-content">
<div class="page-title">数据统计</div>
<div class="stats-grid">
<div class="stat-card"><div class="label">今日销售额</div><div class="num" id="totalSales">¥0.00</div></div>
<div class="stat-card"><div class="label">今日订单数</div><div class="num" id="todayOrders">0</div></div>
<div class="stat-card"><div class="label">商品总数</div><div class="num" id="totalGoods">0</div></div>
<div class="stat-card"><div class="label">库存预警</div><div class="num" id="lowStockCount">0</div></div>
</div>
<div class="section-title">热销商品 TOP10</div>
<table><thead><tr><th>排名</th><th>商品名称</th><th>分类</th><th>价格</th><th>库存</th><th>销量</th><th>状态</th></tr></thead><tbody id="hotGoodsTable"></tbody></table>
</div>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script>
async function renderDashboard(){
    var g = await API.getGoods(), os = await API.getOrders();
    var today = new Date(); today.setHours(0,0,0,0); var ts = today.getTime() + 864e5;
    var sales = 0, oc = 0;
    for(var i = 0; i < os.length; i++){
        if(os[i].createTime >= today.getTime() && os[i].createTime < ts && os[i].status !== "cancelled"){ sales += os[i].total || 0; oc++; }
    }
    document.getElementById("totalSales").textContent = "\u00a5" + sales.toFixed(2);
    document.getElementById("todayOrders").textContent = oc;
    document.getElementById("totalGoods").textContent = g.length;
    document.getElementById("lowStockCount").textContent = g.filter(function(x){return x.stock < 50;}).length;
    var hot = [].concat(g).sort(function(a,b){return (b.sales||0) - (a.sales||0);}).slice(0,10);
    var tbody = document.getElementById("hotGoodsTable"); tbody.innerHTML = "";
    for(var i = 0; i < hot.length; i++){
        var tr = document.createElement("tr");
        tr.innerHTML = "<td>" + ((i<3)?"<b>":"") + (i+1) + ((i<3)?"</b>":"") + "</td><td>" + hot[i].name + "</td><td>" + (hot[i].cate||"") + "</td><td>\u00a5" + (hot[i].price||0).toFixed(2) + "</td><td>" + (hot[i].stock||0) + "</td><td>" + (hot[i].sales||0) + "</td><td>" + (hot[i].stock<50?'<span class="status-tag warning">库存不足</span>':'<span class="status-tag success">正常</span>') + "</td>";
        tbody.appendChild(tr);
    }
}
document.getElementById("logoutBtn").addEventListener("click",function(){API.logout(); location.href="login.html";});
if(!API.isLoggedIn()){ location.href="login.html"; }
renderDashboard();
</script></body></html>
